<!DOCTYPE html>
<html lang="fa" dir="rtl" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>محصولات | پنل ادمین</title>
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-surface-50 text-slate-800 transition-colors duration-500 dark:bg-surface-950 dark:text-slate-200" data-page="products" data-search="نام محصول">

<main id="page-main" class="flex-1 p-4 sm:p-6 lg:p-8">
  <div class="mb-8 flex flex-wrap items-end justify-between gap-4 opacity-0-start observe-in">
    <div>
      <h2 class="text-2xl font-bold sm:text-3xl">محصولات</h2>
      <p class="mt-1 text-slate-500">۳۱۸ قلم · ۴ ناموجود</p>
    </div>
    <button type="button" class="inline-flex items-center gap-2 rounded-xl bg-gradient-to-l from-primary-500 to-violet-600 px-4 py-2.5 text-sm font-medium text-white shadow-lg shadow-primary-500/30">
      <span data-icon="plus"></span>
      افزودن محصول
    </button>
  </div>

  <div class="grid gap-5 sm:grid-cols-2 xl:grid-cols-3">
    <article class="chart-card group overflow-hidden opacity-0-start observe-in stagger-1 p-0">
      <div class="flex h-40 items-center justify-center bg-gradient-to-bl from-slate-100 to-slate-50 transition group-hover:from-primary-50 group-hover:to-violet-50 dark:from-slate-800 dark:to-slate-900 dark:group-hover:from-primary-950/50">
        <span class="text-primary-400" data-icon="products"></span>
      </div>
      <div class="p-4">
        <h3 class="font-bold">لپ‌تاپ ایسوس VivoBook</h3>
        <p class="mt-1 text-sm text-slate-500">الکترونیک</p>
        <div class="mt-3 flex items-center justify-between">
          <span class="text-lg font-bold text-primary-600">۴۵,۲۰۰,۰۰۰</span>
          <span class="text-xs text-emerald-600">۲۴ عدد</span>
        </div>
        <div class="mt-3 flex gap-2">
          <button type="button" class="flex-1 rounded-lg border border-slate-200 py-2 text-xs font-medium transition hover:border-primary-300 dark:border-slate-600"><span data-icon="edit"></span> ویرایش</button>
        </div>
      </div>
    </article>
    <article class="chart-card group overflow-hidden opacity-0-start observe-in stagger-2 p-0">
      <div class="flex h-40 items-center justify-center bg-gradient-to-bl from-slate-100 to-slate-50 dark:from-slate-800 dark:to-slate-900">
        <span class="scale-125 text-violet-400" data-icon="cart"></span>
      </div>
      <div class="p-4">
        <h3 class="font-bold">هدفون Sony WH-1000</h3>
        <p class="mt-1 text-sm text-slate-500">صوتی</p>
        <div class="mt-3 flex items-center justify-between">
          <span class="text-lg font-bold text-primary-600">۳,۸۵۰,۰۰۰</span>
          <span class="text-xs text-amber-600">۳ عدد</span>
        </div>
        <div class="mt-3 flex gap-2">
          <button type="button" class="flex-1 rounded-lg border border-slate-200 py-2 text-xs font-medium dark:border-slate-600">ویرایش</button>
        </div>
      </div>
    </article>
    <article class="chart-card group overflow-hidden opacity-0-start observe-in stagger-3 p-0">
      <div class="flex h-40 items-center justify-center bg-gradient-to-bl from-slate-100 to-slate-50 dark:from-slate-800 dark:to-slate-900">
        <span class="scale-125 text-cyan-400" data-icon="star"></span>
      </div>
      <div class="p-4">
        <h3 class="font-bold">کیبورد مکانیکال Keychron</h3>
        <p class="mt-1 text-sm text-slate-500">لوازم جانبی</p>
        <div class="mt-3 flex items-center justify-between">
          <span class="text-lg font-bold text-primary-600">۲,۱۰۰,۰۰۰</span>
          <span class="text-xs text-emerald-600">۵۶ عدد</span>
        </div>
        <div class="mt-3"><button type="button" class="w-full rounded-lg border border-slate-200 py-2 text-xs font-medium dark:border-slate-600">ویرایش</button></div>
      </div>
    </article>
    <article class="chart-card group overflow-hidden opacity-0-start observe-in stagger-4 p-0">
      <div class="flex h-40 items-center justify-center bg-gradient-to-bl from-slate-100 to-slate-50 dark:from-slate-800 dark:to-slate-900">
        <span class="scale-125 text-amber-400" data-icon="eye"></span>
      </div>
      <div class="p-4">
        <h3 class="font-bold">مانیتور سامسونگ ۲۷</h3>
        <p class="mt-1 text-sm text-slate-500">نمایشگر</p>
        <div class="mt-3 flex items-center justify-between">
          <span class="text-lg font-bold text-primary-600">۱۲,۵۰۰,۰۰۰</span>
          <span class="text-xs text-rose-600">ناموجود</span>
        </div>
        <div class="mt-3"><button type="button" class="w-full rounded-lg border border-slate-200 py-2 text-xs font-medium dark:border-slate-600">ویرایش</button></div>
      </div>
    </article>
    <article class="chart-card group overflow-hidden opacity-0-start observe-in stagger-5 p-0 sm:col-span-2 xl:col-span-1">
      <div class="flex h-40 items-center justify-center border-2 border-dashed border-slate-200 bg-slate-50/50 dark:border-slate-700 dark:bg-slate-800/30">
        <div class="text-center text-slate-400">
          <span class="mx-auto mb-2 block w-fit" data-icon="plus"></span>
          <p class="text-sm">محصول جدید</p>
        </div>
      </div>
    </article>
  </div>
</main>

<script src="js/icons.js"></script>
<script src="js/layout.js"></script>
<script src="js/dropdowns.js"></script>
<script src="js/app.js"></script>
</body>
</html>
